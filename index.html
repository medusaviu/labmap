<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Labmap.s — Em breve</title>

<style>

:root{
--bg:#f0ede9;
--blue:#2F55C7;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
color:var(--blue);
font-family:"Courier New", monospace;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
overflow:hidden;
position:relative;
}

/* curvas topográficas */
.topografia1,
.topografia2{
position:fixed;
border:1px solid rgba(47,85,199,.25);
border-radius:50%;
pointer-events:none;
}

.topografia1{
width:420px;
height:260px;
top:-70px;
left:-90px;
transform:rotate(-18deg);
}

.topografia2{
width:500px;
height:300px;
bottom:-90px;
right:-120px;
transform:rotate(18deg);
}

/* rosa dos ventos */
.rosa{
position:fixed;
top:60px;
right:70px;
font-size:42px;
opacity:.75;
}

/* coordenadas */
.coord{
position:fixed;
left:55px;
bottom:50px;
font-size:14px;
opacity:.6;
letter-spacing:.18em;
line-height:1.8;
}

/* cruz cartográfica */
.cruz{
position:fixed;
left:70px;
top:80px;
font-size:28px;
opacity:.55;
}

.container{
width:min(900px,92vw);
text-align:center;
position:relative;
z-index:2;
}

/* logo */
.logo{
width:min(320px,65vw);
display:block;
margin:0 auto 45px;
}

/* título */
h1{
font-size:clamp(1.2rem,2vw,1.8rem);
font-weight:400;
letter-spacing:.18em;
line-height:1.7;
margin-bottom:30px;
}

/* divisor */
.divisor{
width:min(420px,70%);
height:1px;
background:var(--blue);
margin:0 auto 45px;
position:relative;
}

.divisor:after{
content:"✦";
position:absolute;
left:50%;
top:-12px;
transform:translateX(-50%);
background:var(--bg);
padding:0 12px;
}

/* texto */
p{
max-width:760px;
margin:auto;
font-size:clamp(1rem,1.4vw,1.3rem);
line-height:2;
}

/* botão */
.botao{
display:inline-block;
margin-top:52px;
padding:16px 38px;
border:1.5px solid var(--blue);
border-radius:60px;
text-decoration:none;
color:var(--blue);
font-size:1rem;
transition:.3s;
}

.botao:hover{
background:var(--blue);
color:var(--bg);
}

.rodape{
margin-top:55px;
font-size:.9rem;
letter-spacing:.35em;
opacity:.9;
}

/* mobile */
@media(max-width:768px){

body{
padding:55px 24px;
}

.logo{
width:220px;
margin-bottom:32px;
}

h1{
letter-spacing:.08em;
line-height:1.6;
}

p{
font-size:1rem;
line-height:1.8;
}

.botao{
padding:14px 28px;
margin-top:38px;
}

.coord{
display:none;
}

.topografia1{
width:240px;
height:150px;
}

.topografia2{
width:280px;
height:170px;
}

.rosa{
font-size:28px;
top:35px;
right:30px;
}

.cruz{
top:40px;
left:28px;
}

}

</style>
</head>
<body>

<div class="topografia1"></div>
<div class="topografia2"></div>

<div class="rosa">✧</div>
<div class="cruz">⌖</div>

<div class="coord">
09°23'S<br>
40°30'W
</div>

<div class="container">

<img src="logo/LOGO_LABMAP.S.webp" alt="Labmap.s" class="logo">

<h1>✦ EM BREVE, NOSSO SITE ESTARÁ NO AR ✦</h1>

<div class="divisor"></div>

<p>
</p>Estamos cartografando este espaço. </p>
</p>Em breve o site estará no ar com projetos, materiais educativos e mapeamentos.
</p>

<a 
href="https://instagram.com/labmap.s"
target="_blank"
class="botao">
Acompanhe no Instagram
</a>
</div>

</div>

</body>
</html>

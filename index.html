<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Labmap.s — Em breve</title>

<style>

:root{
--bg:#F3F1EC;      /* fundo da logo */
--blue:#2F55C7;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:var(--bg);
font-family:"Courier New", monospace;
color:var(--blue);
overflow:hidden;
padding:30px 20px;
}

/* detalhes decorativos */
.topo-left{
position:fixed;
left:4vw;
top:5vh;
opacity:.35;
font-size:4rem;
}

.topo-right{
position:fixed;
right:6vw;
top:7vh;
font-size:3rem;
opacity:.65;
}

.container{
width:min(90vw,800px);
text-align:center;
}

/* LOGO */
.logo{
width:min(38vw,280px);
min-width:180px;
display:block;
margin:0 auto 40px;
}

/* título */
h1{
font-weight:400;
font-size:clamp(1.15rem,2vw,1.8rem);
letter-spacing:.18em;
line-height:1.6;
margin-bottom:30px;
}

/* divisor */
.divisor{
width:min(380px,70%);
height:1px;
background:var(--blue);
margin:0 auto 42px;
position:relative;
}

.divisor::after{
content:"✦";
position:absolute;
left:50%;
top:-13px;
transform:translateX(-50%);
background:var(--bg);
padding:0 12px;
}

/* texto */
p{
max-width:620px;
margin:auto;
font-size:clamp(1rem,1.5vw,1.35rem);
line-height:1.9;
}

/* botão */
.botao{
display:inline-block;
margin-top:48px;
padding:15px 34px;
border:1.4px solid var(--blue);
border-radius:60px;
text-decoration:none;
color:var(--blue);
font-size:clamp(.95rem,1.3vw,1.1rem);
transition:.3s;
}

.botao:hover{
background:var(--blue);
color:var(--bg);
}

.rodape{
margin-top:50px;
font-size:clamp(.85rem,1vw,1rem);
letter-spacing:.3em;
}

/* MOBILE */
@media (max-width:768px){

body{
padding:40px 22px;
}

.logo{
width:220px;
margin-bottom:32px;
}

.topo-left{
font-size:2.6rem;
left:18px;
top:30px;
}

.topo-right{
font-size:2rem;
right:24px;
top:35px;
}

h1{
letter-spacing:.12em;
line-height:1.7;
margin-bottom:24px;
}

.divisor{
margin-bottom:34px;
}

p{
font-size:1rem;
line-height:1.8;
}

.botao{
margin-top:38px;
padding:14px 28px;
}

.rodape{
margin-top:38px;
letter-spacing:.2em;
}

}

</style>
</head>
<body>

<div class="topo-left">⌇</div>
<div class="topo-right">✦</div>

<div class="container">

<img src="logo/LOGO_LABMAP.S.webp" alt="Labmap.s" class="logo">

<h1>✦ EM BREVE, NOSSO SITE ESTARÁ NO AR ✦</h1>

<div class="divisor"></div>

<p>
Estamos cartografando este espaço.<br>
Em breve o site estará no ar com projetos,<br>
materiais educativos e mapeamentos.
</p>

<a
href="https://instagram.com/labmap.s"
target="_blank"
class="botao">
Acompanhe no Instagram
</a>

<div class="rodape">
✦ EM BREVE NO AR ✦
</div>

</div>

</body>
</html>
